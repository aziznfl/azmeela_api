basePath: /api/v1
definitions:
  github_com_azmeela_sispeg-api_internal_domain.Attendance:
    properties:
      date:
        type: string
      employee_id:
        type: integer
      id:
        type: integer
      time_in:
        type: string
      time_out:
        type: string
    type: object
  github_com_azmeela_sispeg-api_internal_domain.AuthResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
    type: object
  github_com_azmeela_sispeg-api_internal_domain.CashAdvance:
    properties:
      amount:
        type: integer
      date:
        type: string
      employee_id:
        type: integer
      id:
        type: integer
      purpose:
        type: string
      status:
        description: '0: created, 1: approved, 2: disapproved'
        type: integer
    type: object
  github_com_azmeela_sispeg-api_internal_domain.CashAdvancePayment:
    properties:
      amount:
        type: integer
      date:
        type: string
      employee_id:
        type: integer
    required:
    - amount
    - date
    - employee_id
    type: object
  github_com_azmeela_sispeg-api_internal_domain.CashAdvanceRequest:
    properties:
      amount:
        type: integer
      date:
        type: string
      purpose:
        type: string
    required:
    - amount
    - date
    - purpose
    type: object
  github_com_azmeela_sispeg-api_internal_domain.CashAdvanceStatusUpdate:
    properties:
      status:
        enum:
        - 0
        - 1
        - 2
        type: integer
    type: object
  github_com_azmeela_sispeg-api_internal_domain.Employee:
    properties:
      base_salary:
        type: integer
      bio:
        type: string
      contract_end:
        type: string
      contract_start:
        type: string
      cv:
        type: string
      date_sign:
        type: string
      id:
        type: integer
      name:
        type: string
      phone:
        type: string
      status:
        type: integer
      type_id:
        type: integer
      username:
        type: string
    type: object
  github_com_azmeela_sispeg-api_internal_domain.Holiday:
    properties:
      date:
        type: string
      id:
        type: integer
      is_repeated:
        type: integer
      name:
        type: string
    type: object
  github_com_azmeela_sispeg-api_internal_domain.HolidayRequest:
    properties:
      date:
        type: string
      is_repeated:
        enum:
        - 0
        - 1
        type: integer
      name:
        type: string
    required:
    - date
    - name
    type: object
  github_com_azmeela_sispeg-api_internal_domain.Leave:
    properties:
      date:
        type: string
      description:
        type: string
      employee_id:
        type: integer
      grouping:
        type: integer
      id:
        description: Or id_sakit
        type: integer
      status:
        description: '0: created, 1: approved, 2: disapproved'
        type: integer
      type:
        description: '"cuti" or "sakit" for API level abstraction'
        type: string
    type: object
  github_com_azmeela_sispeg-api_internal_domain.LeaveRequest:
    properties:
      description:
        type: string
      end_date:
        type: string
      start_date:
        type: string
      type:
        enum:
        - cuti
        - sakit
        type: string
    required:
    - description
    - end_date
    - start_date
    - type
    type: object
  github_com_azmeela_sispeg-api_internal_domain.LeaveStatusUpdate:
    properties:
      status:
        enum:
        - 0
        - 1
        - 2
        type: integer
      type:
        enum:
        - cuti
        - sakit
        type: string
    required:
    - type
    type: object
  github_com_azmeela_sispeg-api_internal_domain.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  github_com_azmeela_sispeg-api_internal_domain.MonthlySummaryReport:
    properties:
      total_attendances:
        type: integer
      total_debts:
        type: integer
      total_leaves:
        type: integer
      total_overtimes:
        type: integer
      total_sick_days:
        type: integer
    type: object
  github_com_azmeela_sispeg-api_internal_domain.Overtime:
    properties:
      date:
        type: string
      description:
        type: string
      employee_id:
        type: integer
      id:
        type: integer
      status:
        description: '0: created, 1: approved, 2: disapproved'
        type: integer
      time_in:
        type: string
      time_out:
        type: string
    type: object
  github_com_azmeela_sispeg-api_internal_domain.OvertimeRequest:
    properties:
      date:
        type: string
      description:
        type: string
      time_in:
        type: string
      time_out:
        type: string
    required:
    - date
    - description
    - time_in
    - time_out
    type: object
  github_com_azmeela_sispeg-api_internal_domain.OvertimeStatusUpdate:
    properties:
      status:
        enum:
        - 0
        - 1
        - 2
        type: integer
    type: object
  github_com_azmeela_sispeg-api_internal_domain.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the core API for Sispeg Project in Azmeela
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Sispeg API
  version: "1.0"
paths:
  /attendances:
    get:
      consumes:
      - application/json
      description: Get attendances with optional filtering
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Attendance'
            type: array
      summary: Get attendances
      tags:
      - attendances
  /attendances/clock-in:
    post:
      consumes:
      - application/json
      description: Create an attendance record for the logged in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Attendance'
      summary: Clock-in attendances
      tags:
      - attendances
  /attendances/clock-out:
    post:
      consumes:
      - application/json
      description: Update check-out for the logged in user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Attendance'
      summary: Clock-out attendances
      tags:
      - attendances
  /attendances/today:
    get:
      consumes:
      - application/json
      description: Get all attendance records for today
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Attendance'
            type: array
      summary: Get today's attendances
      tags:
      - attendances
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a user using username and password
      parameters:
      - description: Login Credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logs out a user and revokes their refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: refresh_token
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Logout user
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a refresh token
      parameters:
      - description: Refresh Token Request
        in: body
        name: refresh_token
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Refresh token
      tags:
      - auth
  /cash-advances:
    get:
      consumes:
      - application/json
      description: Get a list of cash advance requests
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.CashAdvance'
            type: array
      summary: Get cash advances
      tags:
      - cash-advances
    post:
      consumes:
      - application/json
      description: Request a new cash advance
      parameters:
      - description: Cash advance request details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.CashAdvanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.CashAdvance'
      summary: Request cash advance
      tags:
      - cash-advances
  /cash-advances/{id}/status:
    put:
      consumes:
      - application/json
      description: Approve or reject a cash advance request
      parameters:
      - description: Cash Advance ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.CashAdvanceStatusUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Update cash advance status
      tags:
      - cash-advances
  /cash-advances/payment:
    post:
      consumes:
      - application/json
      description: Record a payment toward a cash advance (debt)
      parameters:
      - description: Payment details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.CashAdvancePayment'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      summary: Add cash advance payment
      tags:
      - cash-advances
  /employees:
    get:
      consumes:
      - application/json
      description: Get a list of all employees
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
            type: array
      summary: Get all employees
      tags:
      - employees
    post:
      consumes:
      - application/json
      description: Create a new employee
      parameters:
      - description: Employee object
        in: body
        name: employee
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
      summary: Create an employee
      tags:
      - employees
  /employees/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an employee profile
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Delete an employee
      tags:
      - employees
    get:
      consumes:
      - application/json
      description: Get an employee by ID
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
      summary: Get a single employee
      tags:
      - employees
    put:
      consumes:
      - application/json
      description: Update an employee profile
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Employee object
        in: body
        name: employee
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Employee'
      summary: Update an employee
      tags:
      - employees
  /health:
    get:
      consumes:
      - application/json
      description: Check the server health
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health Check API
      tags:
      - system
  /holidays:
    get:
      consumes:
      - application/json
      description: Get a list of holidays
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Holiday'
            type: array
      summary: Get holidays
      tags:
      - holidays
    post:
      consumes:
      - application/json
      description: Create a new holiday
      parameters:
      - description: Holiday request details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.HolidayRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Holiday'
      summary: Create holiday
      tags:
      - holidays
  /leaves:
    get:
      consumes:
      - application/json
      description: Get a list of leave requests
      parameters:
      - description: Type filter (cuti/sakit)
        in: query
        name: type
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Leave'
            type: array
      summary: Get leaves
      tags:
      - leaves
    post:
      consumes:
      - application/json
      description: Request a new leave or sick day
      parameters:
      - description: Leave request details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.LeaveRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Leave'
      summary: Request Leave
      tags:
      - leaves
  /leaves/{id}/status:
    put:
      consumes:
      - application/json
      description: Approve or reject a leave request
      parameters:
      - description: Leave ID
        in: path
        name: id
        required: true
        type: integer
      - description: Leave status override
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.LeaveStatusUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Update leave status
      tags:
      - leaves
  /overtimes:
    get:
      consumes:
      - application/json
      description: Get a list of overtime requests
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Overtime'
            type: array
      summary: Get overtimes
      tags:
      - overtimes
    post:
      consumes:
      - application/json
      description: Request a new overtime
      parameters:
      - description: Overtime request details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.OvertimeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.Overtime'
      summary: Request overtime
      tags:
      - overtimes
  /overtimes/{id}/status:
    put:
      consumes:
      - application/json
      description: Approve or reject an overtime request
      parameters:
      - description: Overtime ID
        in: path
        name: id
        required: true
        type: integer
      - description: Status update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.OvertimeStatusUpdate'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Update overtime status
      tags:
      - overtimes
  /reports/monthly-summary:
    get:
      consumes:
      - application/json
      description: Get a summary of attendances, overtimes, leaves, and debts for
        a specific month
      parameters:
      - description: Month (1-12), defaults to current
        in: query
        name: month
        type: integer
      - description: Year (YYYY), defaults to current
        in: query
        name: year
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_azmeela_sispeg-api_internal_domain.MonthlySummaryReport'
      summary: Get monthly summary report
      tags:
      - reports
swagger: "2.0"
